<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AA Games</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080c;--bg2:#0c0e14;--card:#11131c;--card2:#181b27;--bdr:#1c1f2e;--txt:#e2e4ed;--dim:#5a5e74;--acc:#00ffa3;--accg:rgba(0,255,163,.1);--acc2:#6c5ce7;--acc2g:rgba(108,92,231,.12);--red:#ff4757;--org:#ffa34d;--r:10px;--font:'Chakra Petch',sans-serif;--mono:'JetBrains Mono',monospace}
html{scrollbar-width:thin;scrollbar-color:var(--bdr) var(--bg)}
body{background:var(--bg);color:var(--txt);font-family:var(--font);min-height:100vh;overflow-x:hidden}
body.noscroll{overflow:hidden!important;position:fixed;width:100%;height:100%}
header{position:sticky;top:0;z-index:100;background:rgba(7,8,12,.88);backdrop-filter:blur(24px) saturate(1.6);border-bottom:1px solid var(--bdr);padding:0 20px}
.hi{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:54px;gap:12px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;cursor:pointer}
.logo-i{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),#00c9ff);border-radius:8px;display:grid;place-items:center;font-weight:900;font-size:13px;color:var(--bg);letter-spacing:-1px;box-shadow:0 0 20px rgba(0,255,163,.25)}
.logo-t{font-weight:800;font-size:20px;letter-spacing:-0.5px}.logo-t span{background:linear-gradient(135deg,var(--acc),#00c9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;align-items:center;gap:8px}
.sb{flex:1;max-width:320px;position:relative}
.sb input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 12px 8px 34px;color:var(--txt);font-family:var(--font);font-size:12px;outline:none;transition:.2s}
.sb input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accg)}
.sb input::placeholder{color:var(--dim)}
.sb svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);width:15px;height:15px}
.set-btn{width:34px;height:34px;background:var(--card);border:1px solid var(--bdr);border-radius:8px;display:grid;place-items:center;cursor:pointer;color:var(--dim);font-size:16px;transition:.2s;flex-shrink:0}
.set-btn:hover{border-color:var(--acc);color:var(--acc)}
.cats{max-width:1440px;margin:0 auto;padding:12px 20px 0;display:flex;gap:5px;flex-wrap:wrap}
.cb{background:var(--card);border:1px solid var(--bdr);color:var(--dim);font-family:var(--font);font-size:11px;font-weight:700;padding:5px 12px;border-radius:6px;cursor:pointer;transition:.2s;letter-spacing:.3px}
.cb:hover{border-color:var(--acc);color:var(--txt)}.cb.on{background:var(--accg);border-color:var(--acc);color:var(--acc)}
.main{max-width:1440px;margin:0 auto;padding:16px 20px 60px}
.gt{font-size:11px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.gt .c{background:var(--accg);color:var(--acc);font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:12px}
.gc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.3s;animation:fu .4s ease backwards}
.gc:hover{border-color:var(--acc);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px var(--acc),0 0 30px rgba(0,255,163,.08)}
.gth{width:100%;aspect-ratio:16/10;background:var(--card2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gth-e{font-size:44px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.6));position:relative;z-index:1}
.gth::after{content:'▶ PLAY';position:absolute;inset:0;display:grid;place-items:center;background:rgba(7,8,12,.7);backdrop-filter:blur(4px);color:var(--acc);font-weight:800;font-size:13px;letter-spacing:3px;opacity:0;transition:.25s;z-index:2}
.gc:hover .gth::after{opacity:1}
.gi{padding:10px 12px}.gn{font-weight:700;font-size:12px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gm{display:flex;align-items:center;justify-content:space-between}
.gtag{font-size:8px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;padding:2px 6px;border-radius:3px}
.gtag.racing{background:rgba(255,163,77,.1);color:var(--org)}
.gtag.action{background:rgba(255,71,87,.1);color:var(--red)}
.gtag.arcade{background:var(--accg);color:var(--acc)}
.gtag.puzzle{background:var(--acc2g);color:var(--acc2)}
.gtag.sport{background:rgba(52,172,224,.1);color:#34ace0}
.gtag.idle{background:rgba(255,234,167,.1);color:#ffd32a}
.gtag.casino{background:rgba(255,215,0,.1);color:#ffd700}
.gk{font-size:8px;color:var(--dim);font-family:var(--mono)}.gk kbd{background:var(--bg);border:1px solid var(--bdr);border-radius:2px;padding:1px 4px;font-family:var(--mono);font-size:7px}
.pop-badge{position:absolute;top:6px;right:6px;background:linear-gradient(135deg,#ff4757,#ff6b81);color:#fff;font-size:7px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.8px;text-transform:uppercase;z-index:1;box-shadow:0 2px 8px rgba(255,71,87,.3)}
.save-badge{position:absolute;top:6px;left:6px;background:linear-gradient(135deg,var(--acc),#00c9ff);color:var(--bg);font-size:7px;font-weight:800;padding:2px 6px;border-radius:3px;letter-spacing:.8px;text-transform:uppercase;z-index:1}
.po{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.po.on{display:flex}
.ph{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;gap:8px}
.pt{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pa{display:flex;gap:5px;flex-shrink:0;align-items:center}
.vol-wrap{display:flex;align-items:center;gap:4px;padding:0 6px}
.vol-wrap svg{width:14px;height:14px;color:var(--dim);flex-shrink:0}
.vol-slider{-webkit-appearance:none;appearance:none;width:70px;height:4px;background:var(--bdr);border-radius:2px;outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer;box-shadow:0 0 6px rgba(0,255,163,.4)}
.vol-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer;border:none}
.pb{background:var(--bg);border:1px solid var(--bdr);color:var(--txt);font-family:var(--font);font-size:11px;font-weight:700;padding:5px 10px;border-radius:6px;cursor:pointer;transition:.2s}
.pb:hover{border-color:var(--acc);color:var(--acc)}
.pb.cl:hover{border-color:var(--red);color:var(--red)}
.pf{flex:1;background:#000;overflow:hidden}
.pf iframe{width:100%;height:100%;border:none;background:#000}
.pkh{text-align:center;padding:5px;font-size:10px;color:var(--dim);background:var(--card);border-top:1px solid var(--bdr);flex-shrink:0;font-family:var(--mono)}
.pkh kbd{background:var(--bg);border:1px solid var(--bdr);border-radius:2px;padding:1px 5px;font-family:var(--mono);font-size:9px;color:var(--txt)}
.settings-overlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:none;place-items:center}
.settings-overlay.on{display:grid}
.settings-panel{background:var(--card);border:1px solid var(--bdr);border-radius:14px;padding:24px;width:90%;max-width:380px;animation:fu .3s ease}
.sp-title{font-size:16px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.sp-title button{background:none;border:none;color:var(--dim);font-size:18px;cursor:pointer;padding:0 4px}
.sp-title button:hover{color:var(--red)}
.sp-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bdr)}
.sp-row:last-child{border:none}
.sp-lbl{font-size:12px;font-weight:600;color:var(--dim)}
.sp-val{font-size:12px;font-weight:700;color:var(--acc);font-family:var(--mono)}
.sp-slider{-webkit-appearance:none;appearance:none;width:120px;height:4px;background:var(--bdr);border-radius:2px;outline:none;cursor:pointer}
.sp-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--acc);cursor:pointer}
.sp-slider::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--acc);cursor:pointer;border:none}
.toggle{width:36px;height:20px;background:var(--bdr);border-radius:10px;cursor:pointer;position:relative;transition:.2s;border:none}
.toggle.on{background:var(--acc)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:.2s}
.toggle.on::after{left:19px}
.nr{text-align:center;padding:60px 20px;color:var(--dim);display:none}.nr.show{display:block}
footer{text-align:center;padding:14px;color:var(--dim);font-size:10px;border-top:1px solid var(--bdr);font-family:var(--mono);letter-spacing:.5px}
footer span{color:var(--acc)}
@media(max-width:768px){.sb{max-width:none;order:3;flex-basis:100%}.gg{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}.gth-e{font-size:34px}.gi{padding:8px}.gn{font-size:11px}.vol-wrap{display:none}}
@media(max-width:480px){.gg{grid-template-columns:repeat(2,1fr);gap:6px}.gk{display:none}}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

<header><div class="hi">
<div class="logo" onclick="closePlayer()"><div class="logo-i">AA</div><div class="logo-t">AA <span>Games</span></div></div>
<div class="hdr-r">
<div class="sb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg><input type="text" id="si" placeholder="Search games..." oninput="render()"></div>
<div class="set-btn" onclick="toggleSettings()">&#9881;</div>
</div>
</div></header>
<div class="cats">
<button class="cb on" onclick="setCat('all',this)">All</button>
<button class="cb" onclick="setCat('arcade',this)">&#x1f3ae; Arcade</button>
<button class="cb" onclick="setCat('racing',this)">&#x1f3ce;&#xfe0f; Racing</button>
<button class="cb" onclick="setCat('action',this)">&#x2694;&#xfe0f; Action</button>
<button class="cb" onclick="setCat('sport',this)">&#x26bd; Sport</button>
<button class="cb" onclick="setCat('puzzle',this)">&#x1f9e9; Puzzle</button>
<button class="cb" onclick="setCat('idle',this)">&#x23f3; Idle</button>
<button class="cb" onclick="setCat('casino',this)">&#x1f3b0; Casino</button>
</div>
<div class="main">
<div class="gt">Games <span class="c" id="gc">0</span></div>
<div class="gg" id="grid"></div>
<div class="nr" id="nr"><p>No games found.</p></div>
</div>
<div class="po" id="po">
<div class="ph"><span class="pt" id="ptitle">Game</span><div class="pa">
<div class="vol-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg><input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="100" oninput="setVol(this.value)"></div>
<button class="pb" onclick="goFS()">&#x26F6; Full</button>
<button class="pb" onclick="openTab()">&#x2197; Tab</button>
<button class="pb cl" onclick="closePlayer()">&#x2715;</button>
</div></div>
<div class="pf" onclick="document.getElementById('gf').focus()"><iframe id="gf" allowfullscreen allow="keyboard-map;gamepad;autoplay;fullscreen;storage-access" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals" tabindex="0"></iframe></div>
<div class="pkh">Click game to focus &middot; <kbd>Esc</kbd> close &middot; <kbd>F11</kbd> fullscreen</div>
</div>
<div class="settings-overlay" id="setOvr" onclick="if(event.target===this)toggleSettings()">
<div class="settings-panel">
<div class="sp-title">&#9881; Settings <button onclick="toggleSettings()">&#x2715;</button></div>
<div class="sp-row"><span class="sp-lbl">Master Volume</span><div style="display:flex;align-items:center;gap:8px"><input type="range" class="sp-slider" id="masterVol" min="0" max="100" value="100" oninput="setMasterVol(this.value)"><span class="sp-val" id="masterVolVal">100%</span></div></div>
<div class="sp-row"><span class="sp-lbl">Show Popular Badge</span><button class="toggle on" id="togPop" onclick="toggleOpt('pop',this)"></button></div>
<div class="sp-row"><span class="sp-lbl">Animations</span><button class="toggle on" id="togAnim" onclick="toggleOpt('anim',this)"></button></div>
<div class="sp-row"><span class="sp-lbl">Game Count</span><span class="sp-val" id="totalGames">17</span></div>
</div>
</div>
<footer>&#x26a1; <span>AA Games</span> &middot; HTML5 Unblocked Games</footer>

var cat="all",curUrl="",scrollPos=0,masterVolume=100;

function saveSettings(){try{localStorage.setItem("aa_settings",JSON.stringify({vol:masterVolume,pop:opts.pop,anim:opts.anim}))}catch(e){}}
function render(){
var q=document.getElementById("si").value.toLowerCase();
var filtered=GAMES.filter(function(g){var mc=cat==="all"||g.cat===cat;var ms=g.name.toLowerCase().indexOf(q)!==-1||g.cat.indexOf(q)!==-1;return mc&&ms});
filtered.sort(function(a,b){return(b.pop?1:0)-(a.pop?1:0)});
var grid=document.getElementById("grid"),nr=document.getElementById("nr");
document.getElementById("gc").textContent=filtered.length;
if(!filtered.length){grid.innerHTML="";nr.classList.add("show");return}
nr.classList.remove("show");
var h="";
for(var i=0;i<filtered.length;i++){
var g=filtered[i],idx=GAMES.indexOf(g);
var keys=g.ctrl.split(/[+\/,]/).map(function(k){return k.trim()}).slice(0,3);
var kbd=keys.map(function(k){return "<kbd>"+k+"</kbd>"}).join(" ");
var anim=opts.anim?'style="animation-delay:'+(i*0.03)+'s"':'';
h+='<div class="gc" onclick="openGame('+idx+')" '+anim+'>';
h+='<div class="gth"><span class="gth-e">'+g.emoji+'</span>';
if(g.pop&&opts.pop)h+='<span class="pop-badge">Popular</span>';
if(g.save)h+='<span class="save-badge">Saves</span>';
h+='</div><div class="gi"><div class="gn">'+g.name+'</div>';
h+='<div class="gm"><span class="gtag '+g.cat+'">'+g.cat+'</span>';
h+='<span class="gk">'+kbd+'</span></div></div></div>';
}
grid.innerHTML=h;
}
function setCat(c,btn){cat=c;var all=document.querySelectorAll(".cb");for(var i=0;i<all.length;i++)all[i].classList.remove("on");btn.classList.add("on");render()}
function openGame(i){
var g=GAMES[i];
document.getElementById("ptitle").textContent=g.name;
var frame=document.getElementById("gf");
if(g.url==="PLINKO"){frame.src=decodeGame(P64);curUrl=""}
else if(g.url==="BLACKJACK"){frame.src=decodeGame(B64);curUrl=""}
else{if(g.save){frame.removeAttribute("sandbox")}else{frame.setAttribute("sandbox","allow-scripts allow-same-origin allow-popups allow-forms allow-modals")}frame.src=g.url;curUrl=g.url}
document.getElementById("po").classList.add("on");
scrollPos=window.scrollY;
document.body.classList.add("noscroll");
document.body.style.top=(-scrollPos)+"px";
document.getElementById("volSlider").value=masterVolume;
setTimeout(function(){frame.focus()},300);
if(window._saveInt)clearInterval(window._saveInt);
if(g.save){window._saveInt=setInterval(function(){try{var f=document.getElementById("gf");f.contentWindow.eval('if(typeof FS!=="undefined"){FS.syncfs(false,function(){})}')}catch(e){}},30000)}
}
function closePlayer(){
var f=document.getElementById("gf");
try{f.contentWindow.eval('if(typeof Module!=="undefined"&&Module.asmLibraryArg&&Module.asmLibraryArg._WS_Flush){Module.asmLibraryArg._WS_Flush()}if(typeof FS!=="undefined"){FS.syncfs(false,function(){})}')}catch(e){}
if(window._saveInt){clearInterval(window._saveInt);window._saveInt=null}
document.getElementById("po").classList.remove("on");
f.src="about:blank";
document.body.classList.remove("noscroll");
document.body.style.top="";
window.scrollTo(0,scrollPos);
curUrl="";
}
function goFS(){var f=document.getElementById("gf");if(f.requestFullscreen)f.requestFullscreen();else if(f.webkitRequestFullscreen)f.webkitRequestFullscreen()}
function openTab(){if(curUrl)window.open(curUrl,"_blank")}
function setVol(v){masterVolume=parseInt(v);document.getElementById("masterVol").value=v;document.getElementById("masterVolVal").textContent=v+"%";saveSettings()}
function setMasterVol(v){masterVolume=parseInt(v);document.getElementById("volSlider").value=v;document.getElementById("masterVolVal").textContent=v+"%";saveSettings()}
function toggleSettings(){document.getElementById("setOvr").classList.toggle("on");document.getElementById("masterVol").value=masterVolume;document.getElementById("masterVolVal").textContent=masterVolume+"%";document.getElementById("togPop").className="toggle"+(opts.pop?" on":"");document.getElementById("togAnim").className="toggle"+(opts.anim?" on":"");document.getElementById("totalGames").textContent=GAMES.length}
function toggleOpt(key,el){opts[key]=!opts[key];el.classList.toggle("on");saveSettings();render()}
document.addEventListener("keydown",function(e){if(!document.getElementById("po").classList.contains("on"))return;if(e.key==="Escape")closePlayer()});
render();
