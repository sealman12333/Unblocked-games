// ===== STATE =====
var cat="all",curUrl="",scrollPos=0,masterVolume=100,playerOpen=false;
var opts={pop:true,anim:true};
try{var sv=JSON.parse(localStorage.getItem("aa_settings"));if(sv){if(sv.vol!==undefined)masterVolume=sv.vol;if(sv.pop!==undefined)opts.pop=sv.pop;if(sv.anim!==undefined)opts.anim=sv.anim}}catch(e){}
function saveSettings(){try{localStorage.setItem("aa_settings",JSON.stringify({vol:masterVolume,pop:opts.pop,anim:opts.anim}))}catch(e){}}

// ===== RENDER GRID =====
function render(){
var q=document.getElementById("si").value.toLowerCase();
var filtered=GAMES.filter(function(g){var mc=cat==="all"||g.cat===cat;var ms=g.name.toLowerCase().indexOf(q)!==-1||g.cat.indexOf(q)!==-1;return mc&&ms});
filtered.sort(function(a,b){return(b.pop?1:0)-(a.pop?1:0)});
var grid=document.getElementById("grid"),nr=document.getElementById("nr");
document.getElementById("gc").textContent=filtered.length;
if(!filtered.length){grid.innerHTML="";nr.classList.add("show");return}
nr.classList.remove("show");
var h="";
for(var i=0;i<filtered.length;i++){
var g=filtered[i],idx=GAMES.indexOf(g);
var keys=g.ctrl.split(/[+\/,]/).map(function(k){return k.trim()}).slice(0,3);
var kbd=keys.map(function(k){return "<kbd>"+k+"</kbd>"}).join(" ");
var anim=opts.anim?'style="animation-delay:'+(i*0.03)+'s"':'';
h+='<div class="gc" onclick="openGame('+idx+')" '+anim+'>';
h+='<div class="gth"><span class="gth-e">'+g.emoji+'</span>';
if(g.pop&&opts.pop)h+='<span class="pop-badge">Popular</span>';
if(g.save)h+='<span class="save-badge">Saves</span>';
h+='</div><div class="gi"><div class="gn">'+g.name+'</div>';
h+='<div class="gm"><span class="gtag '+g.cat+'">'+g.cat+'</span>';
h+='<span class="gk">'+kbd+'</span></div></div></div>';
}
grid.innerHTML=h;
}

// ===== CATEGORY FILTER =====
function setCat(c,el){cat=c;document.querySelectorAll(".cb").forEach(function(b){b.classList.remove("on")});el.classList.add("on");render()}

// ===== PLAYER =====
function openGame(idx){
var g=GAMES[idx];
var url;
if(g.url==="PLINKO")url=decodeGame(P64);
else if(g.url==="BLACKJACK")url=decodeGame(B64);
else url=g.url;

scrollPos=window.scrollY;
document.body.classList.add("noscroll");
var po=document.getElementById("po");
var gf=document.getElementById("gf");
document.getElementById("ptitle").textContent=g.name;

// Set iframe src and focus it for keyboard
gf.src=url;
po.classList.add("on");
playerOpen=true;

// Focus iframe after load for keyboard input
gf.onload=function(){
  try{gf.contentWindow.focus()}catch(e){}
  gf.focus();
};
// Also focus immediately
setTimeout(function(){gf.focus()},300);
}

function closePlayer(){
var po=document.getElementById("po");
var gf=document.getElementById("gf");
po.classList.remove("on");
playerOpen=false;
setTimeout(function(){gf.src="about:blank"},300);
document.body.classList.remove("noscroll");
window.scrollTo(0,scrollPos);
}

// ===== KEYBOARD FOCUS =====
// When player is open, forward keyboard events to iframe
// Also re-focus iframe on click/tap within player frame area
document.addEventListener("keydown",function(e){
  if(!playerOpen)return;
  var gf=document.getElementById("gf");
  // If focus is NOT in the iframe, push it there
  if(document.activeElement!==gf){
    gf.focus();
  }
});

// Clicking the player frame area focuses the iframe
document.querySelector(".pf").addEventListener("click",function(){
  var gf=document.getElementById("gf");
  gf.focus();
  try{gf.contentWindow.focus()}catch(e){}
});

// ===== FULLSCREEN =====
function goFS(){
var gf=document.getElementById("gf");
if(gf.requestFullscreen)gf.requestFullscreen();
else if(gf.webkitRequestFullscreen)gf.webkitRequestFullscreen();
else if(gf.msRequestFullscreen)gf.msRequestFullscreen();
// Focus after fullscreen
setTimeout(function(){gf.focus();try{gf.contentWindow.focus()}catch(e){}},200);
}

// ===== VOLUME =====
function setVol(v){document.getElementById("volSlider").value=v}
function setMasterVol(v){masterVolume=v;document.getElementById("masterVolVal").textContent=v+"%";saveSettings()}

// ===== SETTINGS =====
function toggleSettings(){document.getElementById("setOvr").classList.toggle("on")}
function toggleOpt(key,el){opts[key]=!opts[key];el.classList.toggle("on");saveSettings();render()}

// ===== INIT =====
render();
document.getElementById("masterVol").value=masterVolume;
document.getElementById("masterVolVal").textContent=masterVolume+"%";
document.getElementById("totalGames").textContent=GAMES.length;
if(!opts.pop)document.getElementById("togPop").classList.remove("on");
if(!opts.anim)document.getElementById("togAnim").classList.remove("on");

// ===== ESCAPE TO CLOSE =====
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"&&playerOpen)closePlayer();
});
</script>
