<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcadeVault</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--card2:#1a1a28;--bdr:#1e1e2e;--txt:#e8e8ef;--dim:#6b6b80;--acc:#00e5a0;--accg:rgba(0,229,160,.15);--acc2:#7c5cfc;--red:#ff4757;--org:#ffa34d;--r:12px}
body{background:var(--bg);color:var(--txt);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
body.noscroll{overflow:hidden!important;position:fixed;width:100%;height:100%}
header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);padding:0 24px}
.hi{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:58px;gap:14px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;flex-shrink:0;cursor:pointer}
.logo-i{width:32px;height:32px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:grid;place-items:center;font-size:16px}
.logo-t{font-weight:800;font-size:18px;color:var(--txt)}.logo-t span{color:var(--acc)}
.sb{flex:1;max-width:340px;position:relative}
.sb input{width:100%;background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:8px 14px 8px 36px;color:var(--txt);font-family:inherit;font-size:13px;outline:none;transition:.2s}
.sb input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--accg)}
.sb input::placeholder{color:var(--dim)}
.sb svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--dim);width:16px;height:16px}
.cats{max-width:1400px;margin:0 auto;padding:14px 24px 0;display:flex;gap:6px;flex-wrap:wrap}
.cb{background:var(--card);border:1px solid var(--bdr);color:var(--dim);font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:7px;cursor:pointer;transition:.2s}
.cb:hover{border-color:var(--acc);color:var(--txt)}.cb.on{background:var(--accg);border-color:var(--acc);color:var(--acc)}
.main{max-width:1400px;margin:0 auto;padding:16px 24px 60px}
.gt{font-size:13px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.gt .c{background:var(--accg);color:var(--acc);font-family:'Space Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px}
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.gc{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.25s;animation:fu .4s ease backwards}
.gc:hover{border-color:var(--acc);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.4),0 0 0 1px var(--acc),0 0 20px var(--accg)}
.gth{width:100%;aspect-ratio:16/10;background:var(--card2);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gth-e{font-size:42px;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.gth::after{content:'\25b6 PLAY';position:absolute;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.6);color:var(--acc);font-weight:700;font-size:14px;letter-spacing:2px;opacity:0;transition:.2s}
.gc:hover .gth::after{opacity:1}
.gi{padding:10px 12px}.gn{font-weight:700;font-size:13px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gm{display:flex;align-items:center;justify-content:space-between}
.gtag{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 7px;border-radius:4px}
.gtag.racing{background:rgba(255,163,77,.12);color:var(--org)}
.gtag.action{background:rgba(255,71,87,.12);color:var(--red)}
.gtag.arcade{background:var(--accg);color:var(--acc)}
.gtag.puzzle{background:rgba(124,92,252,.12);color:var(--acc2)}
.gtag.sport{background:rgba(52,172,224,.12);color:#34ace0}
.gtag.idle{background:rgba(255,234,167,.12);color:#ffd32a}
.gtag.casino{background:rgba(255,215,0,.12);color:#ffd700}
.gk{font-size:9px;color:var(--dim)}.gk kbd{background:var(--bg);border:1px solid var(--bdr);border-radius:2px;padding:1px 4px;font-family:'Space Mono',monospace;font-size:8px}
.pop-badge{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase}
.po{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;overflow:hidden}
.po.on{display:flex}
.ph{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--card);border-bottom:1px solid var(--bdr);flex-shrink:0;gap:10px}
.pt{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pa{display:flex;gap:6px;flex-shrink:0}
.pb{background:var(--bg);border:1px solid var(--bdr);color:var(--txt);font-family:inherit;font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;transition:.2s}
.pb:hover{border-color:var(--acc);color:var(--acc)}
.pb.cl:hover{border-color:var(--red);color:var(--red)}
.pf{flex:1;background:#000;overflow:hidden}
.pf iframe{width:100%;height:100%;border:none;background:#000}
.pkh{text-align:center;padding:6px;font-size:11px;color:var(--dim);background:var(--card);border-top:1px solid var(--bdr);flex-shrink:0}
.pkh kbd{background:var(--bg);border:1px solid var(--bdr);border-radius:2px;padding:1px 5px;font-family:'Space Mono',monospace;font-size:10px;color:var(--txt)}
.nr{text-align:center;padding:60px 20px;color:var(--dim);display:none}.nr.show{display:block}
footer{text-align:center;padding:16px;color:var(--dim);font-size:11px;border-top:1px solid var(--bdr)}
@media(max-width:768px){.sb{max-width:none}.gg{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}.gth-e{font-size:32px}.gi{padding:8px}.gn{font-size:11px}}
@media(max-width:480px){.gg{grid-template-columns:repeat(2,1fr);gap:8px}.gk{display:none}}
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header><div class="hi">
  <div class="logo" onclick="closePlayer()"><div class="logo-i">&#x1f579;&#xfe0f;</div><div class="logo-t">Arcade<span>Vault</span></div></div>
  <div class="sb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="si" placeholder="Search games..." oninput="render()"></div>
</div></header>
<div class="cats">
  <button class="cb on" onclick="setCat('all',this)">All</button>
  <button class="cb" onclick="setCat('arcade',this)">&#x1f3ae; Arcade</button>
  <button class="cb" onclick="setCat('racing',this)">&#x1f3ce;&#xfe0f; Racing</button>
  <button class="cb" onclick="setCat('action',this)">&#x2694;&#xfe0f; Action</button>
  <button class="cb" onclick="setCat('sport',this)">&#x26bd; Sport</button>
  <button class="cb" onclick="setCat('puzzle',this)">&#x1f9e9; Puzzle</button>
  <button class="cb" onclick="setCat('idle',this)">&#x23f3; Idle</button>
  <button class="cb" onclick="setCat('casino',this)">&#x1f3b0; Casino</button>
</div>
<div class="main">
  <div class="gt">Games <span class="c" id="gc">0</span></div>
  <div class="gg" id="grid"></div>
  <div class="nr" id="nr"><p>No games found.</p></div>
</div>
<div class="po" id="po">
  <div class="ph"><span class="pt" id="ptitle">Game</span><div class="pa">
    <button class="pb" onclick="goFS()">&#x26F6; Fullscreen</button>
    <button class="pb" onclick="openTab()">&#x2197; New Tab</button>
    <button class="pb cl" onclick="closePlayer()">&#x2715; Close</button>
  </div></div>
  <div class="pf" onclick="document.getElementById('gf').focus()"><iframe id="gf" allowfullscreen allow="keyboard-map;gamepad;autoplay;fullscreen;storage-access" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-modals" tabindex="0"></iframe></div>
  <div class="pkh">Click game to enable keyboard &#xB7; <kbd>Esc</kbd> close</div>
</div>
<footer>ArcadeVault &#xB7; HTML5 Games</footer>

    var kbd=keys.map(function(k){return "<kbd>"+k+"</kbd>"}).join(" ");
    h+='<div class="gc" onclick="openGame('+idx+')" style="animation-delay:'+(i*0.03)+'s">';
    h+='<div class="gth"><span class="gth-e">'+g.emoji+'</span>';
    if(g.pop)h+='<span class="pop-badge">Popular</span>';
    h+='</div><div class="gi"><div class="gn">'+g.name+'</div>';
    h+='<div class="gm"><span class="gtag '+g.cat+'">'+g.cat+'</span>';
    h+='<span class="gk">'+kbd+'</span></div></div></div>';
  }
  grid.innerHTML=h;
}

function setCat(c,btn){
  cat=c;
  var all=document.querySelectorAll(".cb");
  for(var i=0;i<all.length;i++)all[i].classList.remove("on");
  btn.classList.add("on");
  render();
}

function openGame(i){
  var g=GAMES[i];
  document.getElementById("ptitle").textContent=g.name;
  var frame=document.getElementById("gf");
  if(g.url==="PLINKO"){frame.src=decodeGame(P64);curUrl=""}
  else if(g.url==="BLACKJACK"){frame.src=decodeGame(B64);curUrl=""}
  else{if(g.save){frame.removeAttribute("sandbox")}else{frame.setAttribute("sandbox","allow-scripts allow-same-origin allow-popups allow-forms allow-modals")}frame.src=g.url;curUrl=g.url}
  document.getElementById("po").classList.add("on");
  scrollPos=window.scrollY;
  document.body.classList.add("noscroll");
  document.body.style.top=(-scrollPos)+"px";
  setTimeout(function(){frame.focus()},300);
  if(window._saveInt)clearInterval(window._saveInt);
  if(g.save){window._saveInt=setInterval(function(){try{var f=document.getElementById("gf");f.contentWindow.eval('if(typeof FS!=="undefined"){FS.syncfs(false,function(){})}')}catch(e){}},30000)}
}

function closePlayer(){
  var f=document.getElementById("gf");
  try{f.contentWindow.eval('if(typeof Module!=="undefined"&&Module.asmLibraryArg&&Module.asmLibraryArg._WS_Flush){Module.asmLibraryArg._WS_Flush()}if(typeof FS!=="undefined"){FS.syncfs(false,function(){})}')}catch(e){}
  if(window._saveInt){clearInterval(window._saveInt);window._saveInt=null}
  document.getElementById("po").classList.remove("on");
  f.src="about:blank";
  document.body.classList.remove("noscroll");
  document.body.style.top="";
  window.scrollTo(0,scrollPos);
  curUrl="";
}

function goFS(){
  var f=document.getElementById("gf");
  if(f.requestFullscreen)f.requestFullscreen();
  else if(f.webkitRequestFullscreen)f.webkitRequestFullscreen();
}

function openTab(){
  if(curUrl)window.open(curUrl,"_blank");
}

document.addEventListener("keydown",function(e){
  if(!document.getElementById("po").classList.contains("on"))return;
  if(e.key==="Escape")closePlayer();
});

render();
</script>
</body>
</html>
